spring:
  # -------------------------
  # 数据源配置（MySQL + Druid）
  # -------------------------
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://${DB_HOST:192.168.1.11}:${DB_PORT:3306}/${DB_NAME:foodie_alliance}?serverTimezone=Asia/Shanghai&useUnicode=true&characterEncoding=utf-8&zeroDateTimeBehavior=convertToNull&useSSL=false&allowPublicKeyRetrieval=true
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:lkw2468}
    type: com.alibaba.druid.pool.DruidDataSource

    druid:
      initial-size: ${DRUID_INITIAL_SIZE:5}
      min-idle: ${DRUID_MIN_IDLE:5}
      max-active: ${DRUID_MAX_ACTIVE:20}
      max-wait: ${DRUID_MAX_WAIT:60000}

  # -------------------------
  # Redis 配置
  # -------------------------
  redis:
    host: ${REDIS_HOST:192.168.1.11}
    port: ${REDIS_PORT:6379}
    password: ${REDIS_PASSWORD:lkw2468}
    timeout: ${REDIS_TIMEOUT:3000ms}
    lettuce:
      pool:
        max-active: ${REDIS_POOL_MAX_ACTIVE:8}
        max-wait: ${REDIS_POOL_MAX_WAIT:-1ms}
        max-idle: ${REDIS_POOL_MAX_IDLE:8}
        min-idle: ${REDIS_POOL_MIN_IDLE:0}

  mvc:
    pathmatch:
      matching-strategy: ant_path_matcher

# -------------------------
# MyBatis-Plus 配置
# -------------------------
mybatis-plus:
  mapper-locations: classpath:mapper/*.xml         # Mapper XML 文件路径
  type-aliases-package: com.foodie.entity         # 实体类路径
  configuration:
    map-underscore-to-camel-case: true           # 开启下划线转驼峰
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl  # 控制台打印 SQL
    cache-enabled: false                          # 禁用二级缓存
  global-config:
    db-config:
      id-type: auto                               # 主键自增策略
      logic-delete-field: isDeleted               # 逻辑删除字段
      logic-delete-value: 1                       # 已删除值
      logic-not-delete-value: 0                   # 未删除值

# -------------------------
# Knife4j 接口文档配置
# -------------------------
knife4j:
  enable: ${KNIFE4J_ENABLE:true}
  setting:
    language: zh-CN

# -------------------------
# 日志配置
# -------------------------
logging:
  level:
    com.foodie: ${APP_LOG_LEVEL:debug}    # 业务日志调试级别
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{50} - %msg%n"
