spring:
  # -------------------------
  # Redis 配置
  # -------------------------
  redis:
    database: 2          # 使用不同的数据库

  config:
    import: classpath:application-dev-common.yml

# -------------------------
# JWT 配置（用户端）
# -------------------------
foodie:
  jwt:
    user-secret-key: foodie-user-20260109-secret-key
    user-ttl: 7200000
    user-token-name: user-token
  upload:
    service-path: user

# -------------------------
# 微信支付配置（⚠️ 注意：顶格）
# -------------------------
  wechat:
   appid: your-wechat-appid
   secret: your-wechat-secret
   mchid: your-merchant-id
   mch-serial-no: your-serial-no
   private-key-file-path: /path/to/apiclient_key.pem
   api-v3-key: your-api-v3-key
   notify-url: https://your-domain.com/api/user/pay/notify
   refund-notify-url: https://your-domain.com/api/user/pay/refund-notify

# -------------------------
# 短信配置（⚠️ 注意：顶格）
# -------------------------
  sms:
   access-key-id: your-sms-key
   access-key-secret: your-sms-secret
   sign-name: 吃货联盟
   template-code: SMS_123456789

